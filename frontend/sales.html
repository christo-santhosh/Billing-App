<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sales History</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=9">

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <style>
        /* Tom Select inline styling adjustments */
        .ts-wrapper {
            width: 100%;
        }

        .ts-control {
            background-color: #F8FAFC !important;
            border: 1px solid #E5E7EB !important;
            border-radius: 0.75rem !important;
            padding: 0 16px !important;
            font-size: 0.875rem !important;
            color: #1F2937 !important;
            height: 42px !important;
            min-height: 42px !important;
            display: flex !important;
            align-items: center !important;
            box-shadow: none !important;
            transition: all 0.2s !important;
        }

        .ts-control.focus {
            border-color: #10B981 !important;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2) !important;
            background-color: #ffffff !important;
        }

        .ts-dropdown {
            border-radius: 0.75rem;
            border: 1px solid #E5E7EB;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .ts-dropdown .option {
            padding: 10px 16px;
        }

        .ts-dropdown .active {
            background-color: #D1FAE5;
            color: #064E3B;
        }

        .ts-wrapper.single .ts-control::after {
            border-color: #9CA3AF transparent transparent transparent !important;
            right: 16px !important;
        }
    </style>
</head>

<body class="page-col">

    <!-- Top App Bar -->
    <header class="topbar-simple">
        <a href="/" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex-row gap-sm">
            <span class="material-symbols-outlined text-primary text-2xl">history</span>
            <h1 class="topbar-title">Sales History</h1>
        </div>
        <!-- Spacer to balance header -->
        <div class="spacer"></div>
    </header>

    <main class="main-content">

        <!-- Header & Filter Form -->
        <div class="filter-card mb-md"
            style="background-color: #ffffff; border-radius: 1.5rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); padding: 1.25rem; border: 1px solid transparent;">
            <div class="flex-between" style="margin-bottom: 20px;">
                <div>
                    <h2 class="text-xl font-bold" style="color:#1F2937;">Filter History</h2>
                    <p class="text-xs mt-1" style="color:#6B7280; margin-top: 4px;">Find specific transactions.</p>
                </div>
                <button type="button" onclick="resetFilters()" class="filter-reset-btn"
                    style="padding: 0.25rem 0.75rem; font-size: 0.875rem; font-weight: 500; color: #10B981; border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 9999px; background-color: transparent; cursor: pointer;">
                    Reset
                </button>
            </div>

            <form id="filterForm">
                <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                    <!-- Date Filter (Start) -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label"
                            style="font-size: 0.75rem; font-weight: 600; color: #6B7280; margin-left: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0px;">START
                            DATE</label>
                        <input type="date" id="start_date" name="start_date" class="filter-input"
                            style="width: 100%; background-color: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 0.75rem; font-size: 0.875rem; padding: 0.625rem 0.75rem; color: #1F2937; height: 42px;">
                    </div>

                    <!-- Date Filter (End) -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label"
                            style="font-size: 0.75rem; font-weight: 600; color: #6B7280; margin-left: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0px;">END
                            DATE</label>
                        <input type="date" id="end_date" name="end_date" class="filter-input"
                            style="width: 100%; background-color: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 0.75rem; font-size: 0.875rem; padding: 0.625rem 0.75rem; color: #1F2937; height: 42px;">
                    </div>

                    <!-- Ward Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label"
                            style="font-size: 0.75rem; font-weight: 600; color: #6B7280; margin-left: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0px;">WARD</label>
                        <select id="ward_id" name="ward_id"></select>
                    </div>

                    <!-- Family Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label"
                            style="font-size: 0.75rem; font-weight: 600; color: #6B7280; margin-left: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0px;">FAMILY</label>
                        <select id="family_id" name="family_id"></select>
                    </div>

                    <!-- Payment Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px; grid-column: 1 / -1;">
                        <label class="filter-label"
                            style="font-size: 0.75rem; font-weight: 600; color: #6B7280; margin-left: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0px;">PAYMENT</label>
                        <select id="payment_method" name="payment_method" class="filter-input"
                            style="width: 100%; background-color: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 0.75rem; font-size: 0.875rem; padding: 0.625rem 0.75rem; color: #1F2937; height: 42px;">
                            <option value="">All Methods</option>
                            <option value="CASH">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="CARD">Card</option>
                        </select>
                    </div>
                </div>

                <div class="input-wrapper" style="margin-top: 16px;">
                    <span class="material-symbols-outlined input-icon" style="font-size:20px;">search</span>
                    <input id="searchInput" autocomplete="off" class="input input-with-icon"
                        placeholder="Search by invoice # or name..." type="text"
                        style="width: 100%; background-color: #F8FAFC; border: 1px solid #E5E7EB; border-radius: 0.75rem; font-size: 0.875rem; padding: 0.625rem 0.75rem 0.625rem 2.5rem; color: #1F2937; height: 42px;">
                </div>

            </form>
        </div>

        <!-- Summary Strip -->
        <div id="summaryStrip" class="summary-strip">
            <span id="summaryCount" class="text-xs bold text-primary-dark">-- transactions</span>
            <span id="summaryTotal" class="text-sm extra-bold text-primary">₹--</span>
        </div>

        <!-- Invoice List -->
        <div class="content-area" id="invoiceListContainer">
            <div class="text-center text-muted" style="padding:64px 0;">
                <span class="material-symbols-outlined text-5xl mb-sm" style="display:block;">hourglass_empty</span>
                Loading transactions…
            </div>
        </div>
    </main>

    <!-- Invoice Details Modal -->
    <div id="invoiceModal" class="modal-overlay">
        <div class="modal-box" style="padding:0; overflow:hidden; max-width: 500px;">
            <div class="flex-between" style="padding:16px 24px; border-bottom:1px solid var(--border-green);">
                <div>
                    <h2 class="text-lg bold text-dark">Invoice Details</h2>
                    <p id="modalInvoiceId" class="text-xs text-light">#--</p>
                </div>
                <button onclick="closeModal()" class="modal-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <!-- Customer Info -->
                <div class="flex-row gap-md mb-lg">
                    <div id="modalAvatar" class="avatar-lg bg-primary text-white">?</div>
                    <div style="flex:1; min-width:0;">
                        <p id="modalFamilyName" class="bold text-dark text-md truncate">Family Name</p>
                        <p id="modalFamilyDetails" class="text-sm text-light truncate">Head · Ward</p>
                        <p id="modalPaymentInfo" class="text-xs text-muted mt-xs">Date | Payment</p>
                    </div>
                </div>

                <hr style="border:none; border-top:1px dashed var(--border-green); margin:16px 0;">

                <!-- Items List -->
                <h3 class="text-sm bold text-dark mb-sm">Items Purchased</h3>
                <div id="modalItemsList" class="flex-col gap-sm" style="max-height: 250px; overflow-y: auto;">
                    <div class="text-center text-muted p-sm">Loading items...</div>
                </div>

                <hr style="border:none; border-top:1px dashed var(--border-green); margin:16px 0;">

                <!-- Total -->
                <div class="flex-between">
                    <span class="bold text-dark text-md">Total Amount</span>
                    <span id="modalTotalAmount" class="extra-bold text-primary text-lg">₹0.00</span>
                </div>
            </div>
            <div class="modal-footer flex-row gap-md"
                style="padding: 16px 24px; background: var(--surface-light); border-top: 1px solid var(--border-green);">
                <button id="modalDownloadBtn" class="btn btn-outline flex-1" style="justify-content:center;">
                    <span class="material-symbols-outlined" style="font-size:20px; margin-right:4px;">download</span>
                    Download
                </button>
                <button id="modalWhatsAppBtn" class="btn btn-primary flex-1"
                    style="justify-content:center; background:#25D366; border-color:#25D366; color:white;">
                    <svg style="width:18px;height:18px;fill:currentColor;margin-right:8px;" viewBox="0 0 24 24">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                    </svg>
                    WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js?v=9"></script>
    <script src="/static/js/sales.js?v=9"></script>
</body>

</html>
