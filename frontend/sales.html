<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sales History</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=8">
</head>

<body class="page-col">

    <!-- Top App Bar -->
    <header class="topbar-simple">
        <a href="/" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex-row gap-sm">
            <span class="material-symbols-outlined text-primary text-2xl">history</span>
            <h1 class="topbar-title">Sales History</h1>
        </div>
        <!-- Spacer to balance header -->
        <div class="spacer"></div>
    </header>

    <main class="main-content">

        <!-- Search + Filters (sticky) -->
        <div class="filter-section flex-col gap-md">
            <!-- Search -->
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon" style="font-size:20px;">search</span>
                <input id="searchInput" autocomplete="off" class="input input-with-icon"
                    placeholder="Search by name, phone…" type="text">
            </div>
            <!-- Filter Chips -->
            <div class="chip-row">
                <button id="filterAll" class="chip active">All</button>
                <button id="filterCash" class="chip">
                    <span class="material-symbols-outlined"
                        style="font-size:14px; vertical-align:middle;">currency_rupee</span> Cash
                </button>
                <button id="filterUpi" class="chip">
                    <span class="material-symbols-outlined"
                        style="font-size:14px; vertical-align:middle;">qr_code_scanner</span> UPI
                </button>
            </div>
        </div>

        <!-- Summary Strip -->
        <div id="summaryStrip" class="summary-strip">
            <span id="summaryCount" class="text-xs bold text-primary-dark">-- transactions</span>
            <span id="summaryTotal" class="text-sm extra-bold text-primary">₹--</span>
        </div>

        <!-- Invoice List -->
        <div class="content-area" id="invoiceListContainer">
            <div class="text-center text-muted" style="padding:64px 0;">
                <span class="material-symbols-outlined text-5xl mb-sm" style="display:block;">hourglass_empty</span>
                Loading transactions…
            </div>
        </div>
    </main>

    <script src="/static/js/api.js?v=8"></script>
    <script src="/static/js/sales.js?v=8"></script>
</body>

</html>
