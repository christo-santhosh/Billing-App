<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sales History</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=8">
</head>

<body class="page-col">

    <!-- Top App Bar -->
    <header class="topbar-simple">
        <a href="/" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex-row gap-sm">
            <span class="material-symbols-outlined text-primary text-2xl">history</span>
            <h1 class="topbar-title">Sales History</h1>
        </div>
        <!-- Spacer to balance header -->
        <div class="spacer"></div>
    </header>

    <main class="main-content">

        <!-- Search + Filters (sticky) -->
        <div class="filter-section flex-col gap-md">
            <!-- Search -->
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon" style="font-size:20px;">search</span>
                <input id="searchInput" autocomplete="off" class="input input-with-icon"
                    placeholder="Search by name, phone…" type="text">
            </div>
            <!-- Filter Chips -->
            <div class="chip-row">
                <button id="filterAll" class="chip active">All</button>
                <button id="filterCash" class="chip">
                    <span class="material-symbols-outlined"
                        style="font-size:14px; vertical-align:middle;">currency_rupee</span> Cash
                </button>
                <button id="filterUpi" class="chip">
                    <span class="material-symbols-outlined"
                        style="font-size:14px; vertical-align:middle;">qr_code_scanner</span> UPI
                </button>
            </div>
        </div>

        <!-- Summary Strip -->
        <div id="summaryStrip" class="summary-strip">
            <span id="summaryCount" class="text-xs bold text-primary-dark">-- transactions</span>
            <span id="summaryTotal" class="text-sm extra-bold text-primary">₹--</span>
        </div>

        <!-- Invoice List -->
        <div class="content-area" id="invoiceListContainer">
            <div class="text-center text-muted" style="padding:64px 0;">
                <span class="material-symbols-outlined text-5xl mb-sm" style="display:block;">hourglass_empty</span>
                Loading transactions…
            </div>
        </div>
    </main>

    <!-- Invoice Details Modal -->
    <div id="invoiceModal" class="modal-overlay">
        <div class="modal-box" style="padding:0; overflow:hidden; max-width: 500px;">
            <div class="flex-between" style="padding:16px 24px; border-bottom:1px solid var(--border-green);">
                <div>
                    <h2 class="text-lg bold text-dark">Invoice Details</h2>
                    <p id="modalInvoiceId" class="text-xs text-light">#--</p>
                </div>
                <button onclick="closeModal()" class="modal-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <!-- Customer Info -->
                <div class="flex-row gap-md mb-lg">
                    <div id="modalAvatar" class="avatar-lg bg-primary text-white">?</div>
                    <div style="flex:1; min-width:0;">
                        <p id="modalFamilyName" class="bold text-dark text-md truncate">Family Name</p>
                        <p id="modalFamilyDetails" class="text-sm text-light truncate">Head · Ward</p>
                        <p id="modalPaymentInfo" class="text-xs text-muted mt-xs">Date | Payment</p>
                    </div>
                </div>

                <hr style="border:none; border-top:1px dashed var(--border-green); margin:16px 0;">

                <!-- Items List -->
                <h3 class="text-sm bold text-dark mb-sm">Items Purchased</h3>
                <div id="modalItemsList" class="flex-col gap-sm" style="max-height: 250px; overflow-y: auto;">
                    <div class="text-center text-muted p-sm">Loading items...</div>
                </div>

                <hr style="border:none; border-top:1px dashed var(--border-green); margin:16px 0;">

                <!-- Total -->
                <div class="flex-between">
                    <span class="bold text-dark text-md">Total Amount</span>
                    <span id="modalTotalAmount" class="extra-bold text-primary text-lg">₹0.00</span>
                </div>
            </div>
            <div class="modal-footer flex-row gap-md"
                style="padding: 16px 24px; background: var(--surface-light); border-top: 1px solid var(--border-green);">
                <button id="modalDownloadBtn" class="btn btn-outline flex-1" style="justify-content:center;">
                    <span class="material-symbols-outlined" style="font-size:20px; margin-right:4px;">download</span>
                    Download
                </button>
                <button id="modalWhatsAppBtn" class="btn btn-primary flex-1"
                    style="justify-content:center; background:#25D366; border-color:#25D366; color:white;">
                    <svg style="width:18px;height:18px;fill:currentColor;margin-right:8px;" viewBox="0 0 24 24">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                    </svg>
                    WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js?v=8"></script>
    <script src="/static/js/sales.js?v=8"></script>
</body>

</html>
