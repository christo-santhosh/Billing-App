<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=4">
</head>

<body class="page-col">

    <!-- Main Content (no sidebar) -->
    <main class="main-content">
        <!-- Header -->
        <header class="page-header">
            <div class="topbar-left">
                <a href="/" class="btn-back">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <div>
                    <h1 class="topbar-title">Inventory</h1>
                    <p class="topbar-subtitle">Manage church supplies &amp; stock</p>
                </div>
            </div>
            <button onclick="openAddModal()" class="btn btn-primary">
                <span class="material-symbols-outlined" style="font-size:20px;">add</span>
                <span class="desktop-only">Add Product</span>
            </button>
        </header>

        <!-- Search -->
        <div class="search-section">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon">search</span>
                <input id="searchInput" class="input input-with-icon" placeholder="Search items..." type="text" />
            </div>
        </div>

        <!-- Inventory List -->
        <div class="content-area">
            <div class="inv-header-row">
                <div class="inv-col-1">ID</div>
                <div class="inv-col-4">Product Name</div>
                <div class="inv-col-2 text-center">Stock</div>
                <div class="inv-col-2 text-center">Unit</div>
                <div class="inv-col-2 text-right">Price</div>
                <div class="inv-col-1"></div>
            </div>

            <div id="loadingIndicator" class="text-center p-md text-muted">Loading inventory...</div>
            <div id="inventoryList" class="flex-col gap-md"></div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="productModal" class="modal-overlay">
        <div class="modal-box" style="padding:0; overflow:hidden;">
            <div class="flex-between" style="padding:16px 24px; border-bottom:1px solid var(--border-green);">
                <div>
                    <h2 id="modalTitle" class="text-lg bold text-dark">Product</h2>
                    <p class="text-xs text-light">Fill in details below</p>
                </div>
                <button onclick="closeModal()" class="modal-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="modal-body flex-col gap-md">
                    <div>
                        <label class="label-sm">Product Name</label>
                        <input id="productName" required class="input" type="text" placeholder="e.g. Candles" />
                    </div>
                    <div class="form-row">
                        <div>
                            <label class="label-sm">Stock Level</label>
                            <input id="productStock" required min="0" step="0.01" class="input" type="number"
                                placeholder="Qty" />
                        </div>
                        <div>
                            <label class="label-sm">Unit</label>
                            <input id="productUnit" required class="input" type="text" placeholder="pcs, kg" />
                        </div>
                    </div>
                    <div>
                        <label class="label-sm">Unit Price (₹)</label>
                        <div class="input-wrapper">
                            <span class="input-icon" style="color:var(--text-light);">₹</span>
                            <input id="productPrice" required min="0" step="0.01" class="input input-with-icon"
                                type="number" placeholder="0.00" />
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closeModal()" class="btn btn-outline flex-1">Cancel</button>
                    <button type="submit" class="btn btn-primary flex-1">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/api.js?v=4"></script>
    <script src="/static/js/inventory.js?v=4"></script>
</body>

</html>
