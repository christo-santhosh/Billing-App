<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "primary-dark": "#15803d",
                        "accent": "#dcfce7",
                        "border-green": "#bbf7d0",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 font-display text-slate-900 overflow-hidden h-screen w-full flex">

    <!-- Sidebar Icon Rail -->
    <aside
        class="w-20 bg-white border-r border-border-green flex flex-col items-center py-6 gap-8 shrink-0 z-20 shadow-sm">
        <div
            class="size-10 rounded-full bg-accent flex items-center justify-center text-primary shadow-sm border border-border-green">
            <span class="material-symbols-outlined text-2xl">church</span>
        </div>
        <nav class="flex flex-col gap-6 w-full items-center flex-1">
            <a href="index.html"
                class="size-12 rounded-xl flex items-center justify-center text-slate-400 hover:text-primary hover:bg-accent transition-colors"
                title="Dashboard">
                <span class="material-symbols-outlined">dashboard</span>
            </a>
            <a href="pos.html"
                class="size-12 rounded-xl flex items-center justify-center text-slate-400 hover:text-primary hover:bg-accent transition-colors"
                title="POS">
                <span class="material-symbols-outlined">point_of_sale</span>
            </a>
            <a href="inventory.html"
                class="size-12 rounded-xl bg-accent text-primary flex items-center justify-center border border-border-green"
                title="Inventory">
                <span class="material-symbols-outlined">inventory_2</span>
            </a>
            <a href="families.html"
                class="size-12 rounded-xl flex items-center justify-center text-slate-400 hover:text-primary hover:bg-accent transition-colors"
                title="Families">
                <span class="material-symbols-outlined">group</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-50">
        <!-- Header -->
        <header
            class="flex items-center justify-between px-6 py-4 bg-white border-b border-border-green shrink-0 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold leading-tight tracking-tight text-slate-800">Inventory</h1>
                <p class="text-sm text-slate-500">Manage church supplies &amp; stock</p>
            </div>
            <button onclick="openAddModal()"
                class="bg-primary hover:bg-primary-dark text-white h-10 px-4 rounded-lg flex items-center gap-2 font-semibold shadow-md shadow-primary/20 transition-all active:scale-95">
                <span class="material-symbols-outlined text-[20px]">add</span>
                <span class="hidden sm:inline">Add Product</span>
            </button>
        </header>

        <!-- Search -->
        <div class="px-6 py-4 bg-white border-b border-border-green">
            <div class="relative flex-1">
                <span
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined">search</span>
                <input
                    class="w-full h-11 pl-10 pr-4 bg-slate-50 border border-border-green rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-sm placeholder:text-slate-400 shadow-sm"
                    placeholder="Search items..." type="text" />
            </div>
        </div>

        <!-- Inventory List -->
        <div class="flex-1 overflow-y-auto px-6 py-4">
            <div
                class="hidden md:grid grid-cols-12 gap-4 px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                <div class="col-span-1">ID</div>
                <div class="col-span-4">Product Name</div>
                <div class="col-span-2 text-center">Stock</div>
                <div class="col-span-2 text-center">Unit</div>
                <div class="col-span-2 text-right">Price</div>
                <div class="col-span-1"></div>
            </div>

            <div id="loadingIndicator" class="text-center py-10 text-slate-400">Loading inventory...</div>
            <div id="inventoryList" class="flex flex-col gap-3"></div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="productModal"
        class="absolute inset-0 z-50 flex items-center justify-center bg-black/30 hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden border border-border-green">
            <div class="px-6 py-4 border-b border-border-green flex justify-between items-center">
                <div>
                    <h2 id="modalTitle" class="text-lg font-bold text-slate-900">Product</h2>
                    <p class="text-xs text-slate-500">Fill in details below</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Product Name</label>
                        <input id="productName" required
                            class="w-full h-11 px-4 bg-slate-50 border border-border-green rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-900"
                            type="text" placeholder="e.g. Candles" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Stock Level</label>
                            <input id="productStock" required min="0" step="0.01"
                                class="w-full h-11 px-4 bg-slate-50 border border-border-green rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-900"
                                type="number" placeholder="Qty" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Unit</label>
                            <input id="productUnit" required
                                class="w-full h-11 px-4 bg-slate-50 border border-border-green rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-900"
                                type="text" placeholder="pcs, kg" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Unit Price (₹)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">₹</span>
                            <input id="productPrice" required min="0" step="0.01"
                                class="w-full h-11 pl-8 pr-4 bg-slate-50 border border-border-green rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-slate-900"
                                type="number" placeholder="0.00" />
                        </div>
                    </div>
                </div>
                <div class="px-6 py-4 bg-slate-50 border-t border-border-green flex gap-3">
                    <button type="button" onclick="closeModal()"
                        class="flex-1 h-11 rounded-lg border border-border-green text-slate-700 font-semibold hover:bg-accent transition-colors">Cancel</button>
                    <button type="submit"
                        class="flex-1 h-11 rounded-lg bg-primary text-white font-semibold hover:bg-primary-dark shadow-md transition-all">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/inventory.js"></script>
</body>

</html>
