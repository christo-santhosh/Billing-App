<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>POS Billing Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "primary-dark": "#15803d",
                        "accent": "#dcfce7",
                        "border-green": "#bbf7d0",
                        "surface-cart": "#f0fdf4",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 font-display text-slate-900 antialiased overflow-hidden h-screen flex flex-col">

    <!-- Top App Bar -->
    <header
        class="flex items-center justify-between px-4 py-3 bg-white border-b border-border-green shrink-0 z-20 shadow-sm">
        <a href="index.html" class="p-2 -ml-2 rounded-full hover:bg-accent text-slate-600 transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-2xl">church</span>
            <h1 class="text-lg font-bold tracking-tight text-slate-800">POS Terminal</h1>
        </div>
        <a href="inventory.html" class="p-2 -mr-2 rounded-full hover:bg-accent text-slate-600 transition-colors">
            <span class="material-symbols-outlined">inventory_2</span>
        </a>
    </header>

    <main class="flex-1 flex flex-col overflow-hidden relative min-h-0">
        <!-- Family Selection -->
        <div class="px-4 py-3 shrink-0 bg-white z-10 border-b border-border-green">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Select Family for
                Invoice</label>
            <div class="relative">
                <select id="familySelect"
                    class="w-full bg-slate-50 border border-border-green rounded-xl h-11 px-4 text-sm font-medium focus:ring-2 focus:ring-primary appearance-none text-slate-800">
                    <option value="">Loading families...</option>
                </select>
                <span
                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="flex-1 overflow-y-auto px-4 pb-48 pt-3">
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Add Items to Cart</h2>
            <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 pb-4">
                <div class="col-span-full text-center py-10 text-slate-400">Loading products...</div>
            </div>
        </div>
    </main>

    <!-- Bottom Cart Sheet -->
    <div class="absolute bottom-0 left-0 right-0 z-30 bg-white border-t border-border-green rounded-t-2xl shadow-[0_-4px_20px_rgba(22,163,74,0.1)] transition-transform duration-300 transform translate-y-[calc(100%-70px)]"
        id="cartSheet">
        <div class="w-full flex justify-center pt-3 pb-1 cursor-pointer" id="cartHandle">
            <div class="w-12 h-1.5 rounded-full bg-green-200"></div>
        </div>

        <div class="px-4 pb-4">
            <!-- Cart Header -->
            <div class="flex items-center justify-between mb-4 cursor-pointer" id="cartHeaderToggle">
                <div class="flex items-center gap-2">
                    <div class="bg-accent text-primary p-2 rounded-lg">
                        <span class="material-symbols-outlined">shopping_cart</span>
                    </div>
                    <span class="text-slate-800 font-bold text-lg">Current Bill</span>
                </div>
                <span id="cartCount" class="px-2 py-1 bg-slate-100 text-xs font-medium text-slate-600 rounded-md">0
                    Items</span>
            </div>

            <!-- Cart Items List -->
            <div id="cartItemsList" class="max-h-[30vh] overflow-y-auto mb-4 space-y-3 no-scrollbar">
                <div class="text-center text-slate-400 text-sm py-4">Cart is empty</div>
            </div>

            <!-- Footer -->
            <div class="border-t border-border-green pt-3">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-500 text-sm">Total Amount</span>
                    <span id="cartTotal" class="text-2xl font-bold text-primary">₹0.00</span>
                </div>
                <button id="completeBillBtn"
                    class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary py-3.5 px-6 text-base font-bold text-white shadow-lg shadow-primary/30 transition-all active:scale-95 hover:bg-primary-dark disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="material-symbols-outlined">receipt_long</span>
                    Complete Bill
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4 hidden">
        <div class="w-full max-w-sm bg-white rounded-2xl p-6 shadow-2xl border border-border-green relative">
            <button onclick="closeSuccessModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div class="flex flex-col items-center text-center">
                <div class="h-16 w-16 rounded-full bg-accent flex items-center justify-center mb-4 text-primary">
                    <span class="material-symbols-outlined text-[32px]">check_circle</span>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-1">Payment Successful!</h3>
                <p id="successInvoiceText" class="text-sm text-slate-500 mb-6">Invoice created successfully.</p>
                <div class="w-full space-y-3">
                    <a id="whatsappLink" href="#" target="_blank"
                        class="w-full flex items-center justify-center gap-2 rounded-xl bg-[#25D366] hover:bg-[#20bd5a] py-3 text-white font-bold transition-colors">
                        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                            <path
                                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                        </svg>
                        Share to WhatsApp
                    </a>
                    <button id="downloadPdfBtn"
                        class="w-full flex items-center justify-center gap-2 rounded-xl border border-border-green hover:bg-accent py-3 text-slate-700 font-medium transition-colors">
                        <span class="material-symbols-outlined text-[20px]">download</span>
                        Download PDF
                    </button>
                    <button onclick="startNewTransaction()"
                        class="w-full py-2 text-slate-400 hover:text-slate-700 text-sm">
                        Start New Transaction
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/pos.js"></script>
</body>

</html>
