<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Advanced Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=4">

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <style>
        /* Modern Filter Styles matching Premium Dashboard UI */
        .filter-card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            padding: 1.25rem;
            border: 1px solid transparent;
        }

        .filter-reset-btn {
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #10B981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 9999px;
            background-color: transparent;
            transition: background-color 0.3s;
            cursor: pointer;
        }

        .filter-reset-btn:hover {
            background-color: rgba(16, 185, 129, 0.1);
        }

        .filter-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #6B7280;
            margin-left: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0px;
        }

        .filter-input {
            width: 100%;
            background-color: #F8FAFC;
            border: 1px solid #E5E7EB;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            padding: 0.625rem 0.75rem;
            color: #1F2937;
            outline: none;
            transition: box-shadow 0.2s, border-color 0.2s;
            height: 42px;
            font-family: inherit;
        }

        .filter-input:focus {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            border-color: #10B981;
            background-color: #ffffff;
        }

        .apply-btn {
            width: 100%;
            background-color: #10B981;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }

        .apply-btn:hover {
            background-color: #059669;
        }

        /* Adjust Tom Select styling to perfectly match the app's native `.select` UI */
        .ts-wrapper {
            width: 100%;
        }

        .ts-control {
            background-color: #F8FAFC !important;
            border: 1px solid #E5E7EB !important;
            border-radius: 0.75rem !important;
            padding: 0 16px !important;
            font-size: 0.875rem !important;
            color: #1F2937 !important;
            height: 42px !important;
            min-height: 42px !important;
            display: flex !important;
            align-items: center !important;
            box-shadow: none !important;
            transition: all 0.2s !important;
        }

        .ts-control.focus {
            border-color: #10B981 !important;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2) !important;
            background-color: #ffffff !important;
        }

        .ts-dropdown {
            border-radius: 0.75rem;
            border: 1px solid #E5E7EB;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            font-size: 0.875rem;
            margin-top: 4px;
        }

        .ts-dropdown .option {
            padding: 10px 16px;
        }

        .ts-dropdown .active {
            background-color: #D1FAE5;
            color: #064E3B;
        }

        .ts-wrapper.single .ts-control::after {
            border-color: #9CA3AF transparent transparent transparent !important;
            right: 16px !important;
        }
    </style>
</head>

<body class="page-col" style="overflow-x: hidden;">

    <!-- Top App Bar -->
    <header class="topbar-simple">
        <a href="/" class="btn-back">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div class="flex-row gap-sm">
            <span class="material-symbols-outlined text-primary text-2xl">query_stats</span>
            <h1 class="topbar-title">Advanced Analytics</h1>
        </div>
        <!-- Spacer to balance header -->
        <div class="spacer"></div>
    </header>

    <main class="content-area flex-col gap-lg">

        <!-- Header & Filter Form -->
        <div class="filter-card mb-md">
            <div class="flex-between" style="margin-bottom: 20px;">
                <div>
                    <h2 class="text-xl font-bold" style="color:#1F2937;">Data Filters</h2>
                    <p class="text-xs mt-1" style="color:#6B7280; margin-top: 4px;">Filter insights across sales and
                        wards.</p>
                </div>
                <button type="button" onclick="resetFilters()" class="filter-reset-btn">
                    Reset
                </button>
            </div>

            <form id="filterForm">
                <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                    <!-- Date Filter (Start) -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label">START DATE</label>
                        <input type="date" id="start_date" name="start_date" class="filter-input">
                    </div>

                    <!-- Date Filter (End) -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label">END DATE</label>
                        <input type="date" id="end_date" name="end_date" class="filter-input">
                    </div>

                    <!-- Ward Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label">WARD</label>
                        <select id="ward_id" name="ward_id"></select>
                    </div>

                    <!-- Family Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <label class="filter-label">FAMILY</label>
                        <select id="family_id" name="family_id"></select>
                    </div>

                    <!-- Payment Filter -->
                    <div style="display:flex; flex-direction:column; gap:6px; grid-column: 1 / -1;">
                        <label class="filter-label">PAYMENT</label>
                        <select id="payment_method" name="payment_method" class="filter-input">
                            <option value="">All Methods</option>
                            <option value="CASH">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="CARD">Card</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="apply-btn" onclick="fetchAnalyticsData()">
                    <span class="material-symbols-outlined" style="font-size:18px;">filter_alt</span> Apply Filters
                </button>
            </form>
        </div>

        <!-- Charts Grid -->
        <div
            style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:16px; padding-bottom: 24px;">

            <!-- 1. Revenue & Sales Trend -->
            <div class="card p-md" style="grid-column: 1 / -1;">
                <h3 class="text-lg bold text-dark mb-md">Revenue Trend</h3>
                <div style="height: 300px; position:relative;">
                    <canvas id="revenueTrendChart"></canvas>
                </div>
            </div>

            <!-- 2. Ward Performance Breakdown -->
            <div class="card p-md">
                <h3 class="text-lg bold text-dark mb-md">Ward Performance</h3>
                <div style="height: 250px; position:relative;">
                    <canvas id="wardPerformanceChart"></canvas>
                </div>
            </div>

            <!-- 3. Top Performing Products -->
            <div class="card p-md">
                <h3 class="text-lg bold text-dark mb-md">Top 10 Products (Qty Sold)</h3>
                <div style="height: 250px; position:relative;">
                    <canvas id="topProductsChart"></canvas>
                </div>
            </div>

            <!-- 4. Top Spender Families -->
            <div class="card p-md">
                <h3 class="text-lg bold text-dark mb-md">Top 10 Families (By Revenue)</h3>
                <div style="height: 250px; position:relative;">
                    <canvas id="topFamiliesChart"></canvas>
                </div>
            </div>

            <!-- 5. Payment Method Distribution -->
            <div class="card p-md">
                <h3 class="text-lg bold text-dark mb-md">Payment Methods</h3>
                <div style="height: 250px; position:relative; display:flex; justify-content:center;">
                    <canvas id="paymentMethodChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Global Chart instances
        let charts = {
            revenueTrend: null,
            wardPerformance: null,
            topProducts: null,
            topFamilies: null,
            paymentMethod: null
        };

        let wardSelectInstance = null;
        let familySelectInstance = null;

        const COLORS = [
            '#16a34a', '#3B82F6', '#F59E0B', '#EF4444', '#8B5CF6',
            '#EC4899', '#14B8A6', '#F97316', '#6366F1', '#84CC16'
        ];

        document.addEventListener('DOMContentLoaded', () => {
            loadDropdowns();
            fetchAnalyticsData();

            // Listen for filter changes on standard inputs
            document.getElementById('start_date').addEventListener('change', fetchAnalyticsData);
            document.getElementById('end_date').addEventListener('change', fetchAnalyticsData);
            document.getElementById('payment_method').addEventListener('change', fetchAnalyticsData);
        });

        function resetFilters() {
            document.getElementById('filterForm').reset();

            // Reset Tom Select instances implicitly without triggering infinite change loops
            if (wardSelectInstance) {
                wardSelectInstance.setValue('', true); // true = silent (no change event)
            }
            if (familySelectInstance) {
                familySelectInstance.setValue('', true); // true = silent (no change event)
            }

            fetchAnalyticsData();
        }

        async function loadDropdowns() {
            try {
                // Fetch data first
                const [wardRes, familyRes] = await Promise.all([
                    fetch('/api/wards/'),
                    fetch('/api/families/')
                ]);

                const wardJson = await wardRes.json();
                const familyJson = await familyRes.json();

                // DRF returns paginated responses: { count: X, next: url, previous: url, results: [...] }
                const wardData = wardJson.results || wardJson;
                const familyData = familyJson.results || familyJson;

                // Destroy old instances if exist
                if (wardSelectInstance) {
                    wardSelectInstance.destroy();
                }
                if (familySelectInstance) {
                    familySelectInstance.destroy();
                }

                // Initialize Ward Select
                wardSelectInstance = new TomSelect('#ward_id', {
                    create: false,
                    allowEmptyOption: true,
                    placeholder: "All Wards",
                    options: wardData.map(w => ({
                        value: w.id,
                        text: `${w.ward_name} (${w.ward_number})`
                    })),
                    searchField: ['text'],
                    maxOptions: 500,
                });

                // Initialize Family Select
                familySelectInstance = new TomSelect('#family_id', {
                    create: false,
                    allowEmptyOption: true,
                    placeholder: "All Families",
                    options: familyData.map(f => ({
                        value: f.id,
                        text: f.family_name
                    })),
                    searchField: ['text'],
                    maxOptions: 1000,
                });

                // Proper change binding
                wardSelectInstance.on('change', fetchAnalyticsData);
                familySelectInstance.on('change', fetchAnalyticsData);

            } catch (error) {
                console.error("Failed to load filter dropdowns", error);
            }
        }

        function getFilterParams() {
            const params = new URLSearchParams();
            const start = document.getElementById('start_date').value;
            const end = document.getElementById('end_date').value;
            const wardId = document.getElementById('ward_id').value;
            const familyId = document.getElementById('family_id').value;
            const payment = document.getElementById('payment_method').value;

            if (start) params.append('start_date', start);
            if (end) params.append('end_date', end);
            if (wardId) params.append('ward_id', wardId);
            if (familyId) params.append('family_id', familyId);
            if (payment) params.append('payment_method', payment);

            return params.toString();
        }

        async function fetchAnalyticsData() {
            const query = getFilterParams();
            const qs = query ? `?${query}` : '';

            Promise.all([
                fetch(`/api/analytics/time_based_revenue/${qs}`).then(r => r.json()),
                fetch(`/api/analytics/ward_wise_analysis/${qs}`).then(r => r.json()),
                fetch(`/api/analytics/top_products/${qs}`).then(r => r.json()),
                fetch(`/api/analytics/top_families/${qs}`).then(r => r.json()),
                fetch(`/api/analytics/payment_methods/${qs}`).then(r => r.json())
            ]).then(([trendData, wardData, productData, familyData, paymentData]) => {
                renderRevenueTrend(trendData.trend);
                renderWardPerformance(wardData.ward_revenue);
                renderTopProducts(productData.top_products);
                renderTopFamilies(familyData.top_families);
                renderPaymentMethods(paymentData.payment_distribution);
            }).catch(err => {
                console.error("Failed fetching analytics", err);
            });
        }

        function renderRevenueTrend(data) {
            const ctx = document.getElementById('revenueTrendChart').getContext('2d');
            if (charts.revenueTrend) charts.revenueTrend.destroy();

            if (!data) data = [];

            const labels = data.map(d => d.day);
            const revenues = data.map(d => d.revenue);

            charts.revenueTrend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daily Revenue (₹)',
                        data: revenues,
                        borderColor: '#16a34a',
                        backgroundColor: 'rgba(22, 163, 74, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: {
                            beginAtZero: true,
                            grid: { borderDash: [2, 4], color: '#e2e8f0' },
                            ticks: { callback: (value) => '₹' + value }
                        }
                    }
                }
            });
        }

        function renderWardPerformance(data) {
            const ctx = document.getElementById('wardPerformanceChart').getContext('2d');
            if (charts.wardPerformance) charts.wardPerformance.destroy();

            if (!data) data = [];
            const labels = data.map(d => d.ward_name);
            const values = data.map(d => d.total_revenue);

            charts.wardPerformance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Revenue by Ward (₹)',
                        data: values,
                        backgroundColor: COLORS,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true, ticks: { callback: (value) => '₹' + value } }
                    }
                }
            });
        }

        function renderTopProducts(data) {
            const ctx = document.getElementById('topProductsChart').getContext('2d');
            if (charts.topProducts) charts.topProducts.destroy();

            if (!data) data = [];
            const labels = data.map(d => d.product__name);
            const values = data.map(d => d.total_quantity);

            charts.topProducts = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Units Sold',
                        data: values,
                        backgroundColor: '#3B82F6',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true },
                        y: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTopFamilies(data) {
            const ctx = document.getElementById('topFamiliesChart').getContext('2d');
            if (charts.topFamilies) charts.topFamilies.destroy();

            if (!data) data = [];
            const labels = data.map(d => d.family__family_name);
            const values = data.map(d => d.total_revenue);

            charts.topFamilies = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Revenue (₹)',
                        data: values,
                        backgroundColor: '#F59E0B',
                        borderRadius: 4
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, ticks: { callback: (value) => '₹' + value } },
                        y: { grid: { display: false } }
                    }
                }
            });
        }

        function renderPaymentMethods(data) {
            const ctx = document.getElementById('paymentMethodChart').getContext('2d');
            if (charts.paymentMethod) charts.paymentMethod.destroy();

            if (!data) data = [];
            const labels = data.map(d => d.payment_method);
            const values = data.map(d => d.count);

            const bgColors = labels.map(l => {
                if (l === 'CASH') return '#16a34a';
                if (l === 'UPI') return '#3B82F6';
                if (l === 'CARD') return '#F59E0B';
                return '#94a3b8';
            });

            charts.paymentMethod = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: bgColors,
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { usePointStyle: true, boxWidth: 8 }
                        }
                    }
                }
            });
        }

    </script>
</body>

</html>
