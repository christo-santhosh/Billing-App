<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Login - Billing App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#10b981">
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a249",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            min-height: max(884px, 100dvh);
            background-color: transparent; /* Resetting style.css background if any */
            padding: 0;
            display: block; /* Overriding previous flex if any */
        }
        /* Override style.css margin if needed */
        .flex.min-h-screen {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="flex min-h-screen flex-col items-center justify-center p-6">
    <div class="w-full max-w-md bg-white dark:bg-emerald-950/20 p-8 md:p-12 rounded-xl shadow-sm border border-emerald-100 dark:border-emerald-900/50">
        <div class="flex flex-col items-center mb-10">
            <div class="mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
                <span class="material-symbols-outlined !text-4xl">eco</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-2">Agro Billing</h1>
            <div class="h-1 w-12 bg-primary rounded-full mb-6"></div>
            <h2 class="text-xl font-semibold text-slate-800 dark:text-slate-200">Welcome Back</h2>
            <p class="mt-2 text-sm text-slate-500 dark:text-emerald-500/70">Sign in to access your billing dashboard</p>
        </div>

        <div id="loginError" style="display: none;" class="w-full text-red-600 bg-red-100 dark:bg-red-900/30 dark:text-red-400 p-3 rounded-lg text-sm mb-6 border border-red-200 dark:border-red-800/50 text-center">
            Invalid username or password.
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 dark:text-emerald-100 mb-1.5 ml-1" for="username">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined !text-xl">person</span>
                    </div>
                    <input class="block w-full pl-11 pr-4 py-3.5 bg-background-light dark:bg-emerald-950/30 border border-emerald-100 dark:border-emerald-900 focus:ring-2 focus:ring-primary/20 focus:border-primary rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all outline-none" id="username" name="username" placeholder="Enter your username" type="text" autocomplete="username" required/>
                </div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-1.5 ml-1">
                    <label class="block text-sm font-medium text-slate-700 dark:text-emerald-100" for="password">Password</label>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined !text-xl">lock</span>
                    </div>
                    <input class="block w-full pl-11 pr-12 py-3.5 bg-background-light dark:bg-emerald-950/30 border border-emerald-100 dark:border-emerald-900 focus:ring-2 focus:ring-primary/20 focus:border-primary rounded-lg text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password" autocomplete="current-password" required/>
                    <button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-primary transition-colors" type="button" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password';">
                        <span class="material-symbols-outlined !text-xl">visibility</span>
                    </button>
                </div>
            </div>
            <div class="pt-2">
                <button id="loginBtn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-lg shadow-lg shadow-primary/20 text-sm font-bold text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
            </div>
        </form>
    </div>
    <div class="mt-8 flex items-center space-x-4 opacity-40">
        <span class="h-px w-8 bg-slate-300 dark:bg-emerald-800"></span>
        <span class="h-px w-8 bg-slate-300 dark:bg-emerald-800"></span>
    </div>
</div>

<!-- Scripts -->
<script src="/static/js/api.js"></script>
<script src="/static/js/login.js"></script>
<script src="/static/js/pwa.js"></script>
</body>
</html>
